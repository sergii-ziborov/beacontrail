name: Publish ESP-IDF adapter

on:
  push:
    tags: ["esp-idf-v*"]

permissions:
  contents: read

jobs:
  crates-io:
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.82.0
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: adapters/esp-idf
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' adapters/esp-idf/Cargo.toml | head -n 1)
          test "$RELEASE_TAG" = "esp-idf-v$VERSION"
      - name: Require crates.io credentials
        run: test -n "$CARGO_REGISTRY_TOKEN"
      - run: cargo fmt --manifest-path adapters/esp-idf/Cargo.toml --all --check
      - run: cargo clippy --manifest-path adapters/esp-idf/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path adapters/esp-idf/Cargo.toml
      - run: cargo publish --manifest-path adapters/esp-idf/Cargo.toml --dry-run
      - run: cargo publish --manifest-path adapters/esp-idf/Cargo.toml
