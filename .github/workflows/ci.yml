name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # Build on the GNU toolchain, matching a developer machine that has no
      # Visual C++ build tools. windows-latest ships MSVC, but relying on it
      # would let an MSVC-only regression slip through unnoticed.
      - name: Use the GNU toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --component clippy,rustfmt
          rustup default stable-x86_64-pc-windows-gnu
          rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # CI runners have no WLAN adapter, so only the hardware-independent tests
      # run here: the 802.11 IE parser, the JSON-RPC layer and the ABI layout
      # assertions. Live collector behaviour is verified on real hardware.
      - name: Test
        run: cargo test

      - name: Release build
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: radiochron-windows
          path: target/release/radiochron.exe
